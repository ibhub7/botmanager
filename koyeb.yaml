# koyeb.yaml — Koyeb deployment configuration
# Reference: https://www.koyeb.com/docs/deploy/deploy-with-cli

name: multibot-system

services:
  - name: multibot
    type: web
    instance_type: eco          # cheapest — upgrade to nano/small for production
    regions:
      - fra                     # Frankfurt; also: was (Washington), sin (Singapore)
    ports:
      - port: 8080
        protocol: http
    env:
      - key: API_ID
        value: "YOUR_API_ID"
      - key: API_HASH
        value: "YOUR_API_HASH"
      - key: MASTER_TOKEN
        value: "YOUR_MASTER_BOT_TOKEN"
      - key: MONGO_URI
        value: "YOUR_MONGO_URI"
      - key: DB_NAME
        value: "multibot_system"
      - key: ADMINS
        value: "YOUR_TELEGRAM_USER_ID"
      - key: DASHBOARD_TOKEN
        value: "YOUR_STRONG_SECRET_HERE"
      - key: LOG_CHANNEL
        value: "0"
      - key: WEB_HOST
        value: "0.0.0.0"
      - key: WEB_PORT
        value: "8080"
      - key: BATCH_SIZE
        value: "80"
      - key: CONCURRENCY
        value: "15"
      - key: BOT_RATE_LIMIT
        value: "25"
    health_checks:
      - path: /api/health
        port: 8080
        protocol: http
        interval: 30
        timeout: 5
        healthy_threshold: 1
        unhealthy_threshold: 3
